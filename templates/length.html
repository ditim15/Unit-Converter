{% extends "layout.html" %}

{% block body %}

    <form action="/length">
        <p>Enter the length to convert</p>
        <input type="text" name="length" placeholder="Length" autofocus autocomplete="off">
        <div id="units">
            <label for="from-unit">From</label>
            <select name="from-unit" id="from-unit">
                <option name="mm">Millimeters</option>
                <option name="cm">Centimeters</option>
                <option name="meter" selected>Meters</option>
                <option name="km">Kilometers</option>
                <option name="inch">Inchs</option>
                <option name="foot">Feet</option>
                <option name="yard">Yards</option>
                <option name="mile">Miles</option>
            </select>
            <label for="to-unit">To</label>
            <select name="to-unit" id="to-unit">
                <option name="mm">Millimeters</option>
                <option name="cm">Centimeters</option>
                <option name="meter">Meters</option>
                <option name="km">Kilometers</option>
                <option name="inch">Inchs</option>
                <option name="foot" selected>Feet</option>
                <option name="yard">Yards</option>
                <option name="mile">Miles</option>
            </select>
        </div>
        <button type="submit">Convert</button>
    </form>

{% endblock %}
