{% extends "layout.html" %}

{% block body %}
    <form action="/weight" method="post">
        <p>Enter the width to convert</p>
        <input type="text" placeholder="Weight" name="weight" autofocus autocomplete="off">
        <div id="units">
            <label for="from-unit">From</label>
            <select name="from-unit" id="from-unit">
                <option value="milligrams">Milligram</option>
                <option value="grams" >Gram</option>
                <option value="kilograms" selected>Kilogram</option>
                <option value="ounces">Ounce</option>
                <option value="pounds">Pound</option>
            </select>
            <label for="to-unit">To</label>
            <select name="to-unit" id="to-unit">
                <option value="milligrams">Milligram</option>
                <option value="grams">Gram</option>
                <option value="kilograms">Kilogram</option>
                <option value="ounces">Ounce</option>
                <option value="pounds" selected>Pound</option>
            </select>
        </div>
        <button type="submit">Convert</button>
    </form>
    {% if result is not none %}
        <p>{{ value }} {{ from_unit }} is equal to {{ result }} {{ to_unit }}</p>
    {% endif %}
{% endblock %}
